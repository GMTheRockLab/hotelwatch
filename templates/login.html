<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotelWatch — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .logo { font-size: 52px; margin-bottom: 12px; }
    h1 { font-size: 26px; font-weight: 800; color: #2c3e50; margin-bottom: 8px; }
    .tagline { font-size: 14px; color: #8492a6; margin-bottom: 36px; line-height: 1.5; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider hr { flex: 1; border: none; border-top: 1px solid #e8ecf0; }
    .divider span { font-size: 12px; color: #aaa; }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px;
      border-radius: 10px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      transition: all 0.15s;
      margin-bottom: 12px;
    }
    .btn-ms {
      background: #fff; color: #2c3e50;
      border: 1.5px solid #e8ecf0;
    }
    .btn-ms:hover { background: #f8f9fa; border-color: #3498db; }
    .ms-icon { width: 20px; height: 20px; }

    .btn-email { background: #3498db; color: #fff; }
    .btn-email:hover { background: #2980b9; }

    .email-form { display: none; }
    .email-form.show { display: block; }

    input[type="email"], input[type="password"] {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #e8ecf0; border-radius: 10px;
      font-size: 14px; color: #2c3e50; margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #3498db; }

    .footer { font-size: 12px; color: #aaa; margin-top: 28px; line-height: 1.6; }
    .footer a { color: #3498db; text-decoration: none; }

    #error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🏨</div>
  <h1>HotelWatch</h1>
  <p class="tagline">We monitor your hotel bookings and alert you<br>the moment a lower rate appears.</p>

  <!-- Microsoft OAuth (primary — connects email automatically) -->
  <a href="/auth/microsoft" class="btn btn-ms">
    <svg class="ms-icon" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    Continue with Microsoft
  </a>

  <div class="divider"><hr><span>or sign in with email</span><hr></div>

  <!-- Email/password fallback -->
  <div id="error"></div>
  <div class="email-form show" id="email-form">
    <input type="email" id="email" placeholder="you@example.com">
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-email" onclick="emailLogin()">Sign In</button>
    <p style="font-size:12px;color:#aaa;margin-top:4px;">
      New here? <a href="#" onclick="emailRegister()" style="color:#3498db;">Create an account</a>
    </p>
  </div>

  <p class="footer">
    By continuing, you agree to our
    <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>.<br>
    HotelWatch reads your hotel confirmation emails only.
  </p>
</div>

<script>
// Check if already logged in
if (localStorage.getItem("hw_token")) {
  window.location.href = "/";
}

// Handle Microsoft OAuth callback
const params = new URLSearchParams(window.location.search);
if (params.get("token")) {
  localStorage.setItem("hw_token", params.get("token"));
  window.location.href = "/";
}
if (params.get("error")) {
  document.getElementById("error").style.display = "block";
  document.getElementById("error").textContent = "Authentication failed: " + params.get("error");
}

async function emailLogin() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl    = document.getElementById("error");
  errEl.style.display = "none";

  if (!email || !password) {
    errEl.style.display = "block";
    errEl.textContent = "Please enter your email and password.";
    return;
  }

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Login failed");
    localStorage.setItem("hw_token", data.token);
    window.location.href = "/";
  } catch (e) {
    errEl.style.display = "block";
    errEl.textContent = e.message;
  }
}

async function emailRegister() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl    = document.getElementById("error");
  errEl.style.display = "none";

  if (!email || !password) {
    errEl.style.display = "block";
    errEl.textContent = "Please enter an email and password to register.";
    return;
  }

  try {
    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Registration failed");
    localStorage.setItem("hw_token", data.token);
    window.location.href = "/";
  } catch (e) {
    errEl.style.display = "block";
    errEl.textContent = e.message;
  }
}
</script>
</body>
</html>

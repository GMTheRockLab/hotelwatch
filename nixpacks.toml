[phases.setup]
nixPkgs = ["python3", "gcc", "glib", "nss", "nspr", "atk", "cups", "libdrm", "dbus", "libxkbcommon", "expat", "libxcomposite", "libxdamage", "libxfixes", "libxrandr", "mesa", "pango", "cairo", "alsa-lib"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && playwright install chromium"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"

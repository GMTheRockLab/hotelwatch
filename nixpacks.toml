[phases.setup]
nixPkgs = [
  "python3",
  "gcc",
  "chromium",
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "expat",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "pango",
  "cairo",
  "alsa-lib",
  "xorg.libX11",
  "xorg.libXext"
]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && PLAYWRIGHT_BROWSERS_PATH=/opt/pw-browsers playwright install chromium"
]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/opt/pw-browsers"

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
